name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eventflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        working-directory: ./Backend
        run: npm install

      - name: ⏳ Wait for Postgres
        run: sleep 5

      - name: 🗄️ Init database
        run: |
          psql -h localhost -U postgres -d eventflow_test -f Database/1_createdb.sql
        env:
          PGPASSWORD: postgres

      - name: 🔧 Setup env
        run: |
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_USER=postgres" >> .env
          echo "DB_PASSWORD=postgres" >> .env
          echo "DB_NAME=eventflow_test" >> .env
        working-directory: ./Backend

      - name: 🧪 Run tests
        working-directory: ./Backend
        run: npm test

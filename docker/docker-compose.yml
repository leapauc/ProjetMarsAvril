services:
  postgres:
    image: postgres:17
    container_name: eventflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dfqdhjldhgzdg23dzgzdg
      POSTGRES_DB: eventdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../Database/1_createdb.sql:/docker-entrypoint-initdb.d/1_createdb.sql

  api:
    build: ../Backend
    container_name: eventflow_api
    restart: always
    ports:
      - "3003:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: dfqdhjldhgzdg23dzgzdg
      DB_NAME: eventdb
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ../Frontend
    container_name: eventflow_front
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3003
    depends_on:
      - api

volumes:
  pgdata:
